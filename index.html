<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUXE TEA — Teapot Launch Projection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Helvetica Neue', sans-serif; }
    canvas { display: block; }

    /* Overlay UI */
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    #title {
      position: absolute; top: 6%; left: 50%; transform: translateX(-50%);
      text-align: center; color: #fff;
    }
    #title h1 {
      font-size: 3.2rem; font-weight: 200; letter-spacing: 1.2rem;
      text-transform: uppercase; opacity: 0;
      animation: fadeUp 2s ease 0.5s forwards;
    }
    #title p {
      font-size: 1rem; letter-spacing: 0.5rem; color: rgba(255,255,255,0.5);
      margin-top: 0.5rem; opacity: 0;
      animation: fadeUp 2s ease 1s forwards;
    }
    #bottom-info {
      position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
      text-align: center; color: rgba(255,255,255,0.4);
      font-size: 0.75rem; letter-spacing: 0.3rem; opacity: 0;
      animation: fadeUp 2s ease 1.5s forwards;
    }

    /* Controls */
    #controls {
      position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
      display: flex; gap: 1.5rem; pointer-events: all; opacity: 0;
      animation: fadeUp 2s ease 2s forwards;
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 0.6rem 1.6rem; font-size: 0.75rem;
      letter-spacing: 0.25rem; text-transform: uppercase; cursor: pointer;
      transition: all 0.4s ease; border-radius: 2px;
    }
    .ctrl-btn:hover {
      background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4);
    }
    .ctrl-btn.active {
      background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.6);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    #title h1, #title p {
      transform: translateY(20px);
    }
    @keyframes fadeUpSimple {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #title h1 { animation: fadeUpSimple 2s ease 0.5s forwards; }
    #title p   { animation: fadeUpSimple 2s ease 1s forwards; }
    #bottom-info { animation: fadeUp 2s ease 1.5s forwards; }
  </style>
</head>
<body>

<div id="overlay">
  <div id="title">
    <h1>Luxe Tea</h1>
    <p>The Art of Projection</p>
  </div>
  <div id="controls">
    <button class="ctrl-btn active" data-mode="aurora">Aurora</button>
    <button class="ctrl-btn" data-mode="galaxy">Galaxy</button>
    <button class="ctrl-btn" data-mode="neon">Neon</button>
    <button class="ctrl-btn" data-mode="fire">Fire</button>
  </div>
  <div id="bottom-info">SCROLL TO ZOOM &nbsp;·&nbsp; DRAG TO ROTATE &nbsp;·&nbsp; VIDEO PROJECTION CONCEPT 2026</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TeapotGeometry } from 'three/addons/geometries/TeapotGeometry.js';

// ─── Scene Setup ───
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 2, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 3;
controls.maxDistance = 12;
controls.target.set(0, 1, 0);

// ─── Projection Modes ───
const modes = {
  aurora: {
    bg: new THREE.Color(0x020010),
    emissive: new THREE.Color(0x00ffaa),
    emissive2: new THREE.Color(0x4400ff),
    particleColor: new THREE.Color(0x00ffcc),
    envIntensity: 0.3,
    speed: 0.4,
  },
  galaxy: {
    bg: new THREE.Color(0x000008),
    emissive: new THREE.Color(0x8844ff),
    emissive2: new THREE.Color(0xff2288),
    particleColor: new THREE.Color(0xaaaaff),
    envIntensity: 0.2,
    speed: 0.25,
  },
  neon: {
    bg: new THREE.Color(0x000000),
    emissive: new THREE.Color(0x00ffff),
    emissive2: new THREE.Color(0xff00ff),
    particleColor: new THREE.Color(0x00ffff),
    envIntensity: 0.5,
    speed: 0.6,
  },
  fire: {
    bg: new THREE.Color(0x080000),
    emissive: new THREE.Color(0xff4400),
    emissive2: new THREE.Color(0xffaa00),
    particleColor: new THREE.Color(0xff6600),
    envIntensity: 0.4,
    speed: 0.5,
  },
};
let currentMode = 'aurora';
let targetMode = modes.aurora;

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0x222233, 0.5);
scene.add(ambientLight);

const spotLight1 = new THREE.SpotLight(0xffffff, 30, 20, Math.PI / 5, 0.5, 1);
spotLight1.position.set(3, 6, 3);
scene.add(spotLight1);

const spotLight2 = new THREE.SpotLight(0x4488ff, 15, 20, Math.PI / 5, 0.5, 1);
spotLight2.position.set(-3, 4, -3);
scene.add(spotLight2);

const rimLight = new THREE.PointLight(0xff4488, 8, 10);
rimLight.position.set(0, 3, -4);
scene.add(rimLight);

// ─── Teapot ───
const teapotGeo = new TeapotGeometry(1.2, 15, true, true, true, true, true);

const teapotMat = new THREE.MeshPhysicalMaterial({
  color: 0x111111,
  metalness: 0.3,
  roughness: 0.15,
  clearcoat: 1.0,
  clearcoatRoughness: 0.05,
  emissive: new THREE.Color(0x00ffaa),
  emissiveIntensity: 0.15,
  envMapIntensity: 0.5,
  transparent: true,
  opacity: 0.92,
});

const teapot = new THREE.Mesh(teapotGeo, teapotMat);
teapot.position.y = 1.2;
scene.add(teapot);

// ─── Wireframe Teapot (projection lines effect) ───
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x00ffaa,
  wireframe: true,
  transparent: true,
  opacity: 0.08,
});
const wireTeapot = new THREE.Mesh(teapotGeo, wireMat);
wireTeapot.position.y = 1.2;
wireTeapot.scale.setScalar(1.02);
scene.add(wireTeapot);

// ─── Floor (reflective) ───
const floorGeo = new THREE.CircleGeometry(8, 64);
const floorMat = new THREE.MeshPhysicalMaterial({
  color: 0x050508,
  metalness: 0.9,
  roughness: 0.3,
  clearcoat: 0.5,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.01;
scene.add(floor);

// ─── Grid Ring ───
const ringGeo = new THREE.RingGeometry(2.5, 6, 64);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0x00ffaa,
  transparent: true,
  opacity: 0.04,
  side: THREE.DoubleSide,
});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.01;
scene.add(ring);

// ─── Particles ───
const PARTICLE_COUNT = 3000;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const velocities = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = 1.5 + Math.random() * 3;
  const y = Math.random() * 5;
  positions[i * 3] = Math.cos(theta) * r;
  positions[i * 3 + 1] = y;
  positions[i * 3 + 2] = Math.sin(theta) * r;
  velocities[i * 3] = (Math.random() - 0.5) * 0.002;
  velocities[i * 3 + 1] = 0.003 + Math.random() * 0.008;
  velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.002;
  sizes[i] = 1 + Math.random() * 3;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const particleMat = new THREE.PointsMaterial({
  color: 0x00ffcc,
  size: 0.03,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ─── Projection Beams ───
const beamGroup = new THREE.Group();
scene.add(beamGroup);

for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2;
  const beamGeo = new THREE.CylinderGeometry(0.005, 0.08, 5, 8, 1, true);
  const beamMat = new THREE.MeshBasicMaterial({
    color: 0x00ffaa,
    transparent: true,
    opacity: 0.06,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
  });
  const beam = new THREE.Mesh(beamGeo, beamMat);
  beam.position.set(Math.cos(angle) * 3.5, 2.5, Math.sin(angle) * 3.5);
  beam.lookAt(0, 1.2, 0);
  beam.rotateX(Math.PI / 2);
  beamGroup.add(beam);
}

// ─── Floating Text Ring (projected text effect) ───
const textRingCanvas = document.createElement('canvas');
textRingCanvas.width = 1024;
textRingCanvas.height = 64;
const textCtx = textRingCanvas.getContext('2d');
textCtx.fillStyle = '#000';
textCtx.fillRect(0, 0, 1024, 64);
textCtx.font = '24px Helvetica Neue, sans-serif';
textCtx.fillStyle = '#00ffaa';
textCtx.textAlign = 'center';
const textContent = '  LUXE TEA · PREMIERE COLLECTION · 2026 · THE ART OF PROJECTION · CRAFTED ELEGANCE  ';
textCtx.fillText(textContent, 512, 40);

const textTexture = new THREE.CanvasTexture(textRingCanvas);
textTexture.wrapS = THREE.RepeatWrapping;
textTexture.repeat.set(2, 1);

const textRingGeo = new THREE.CylinderGeometry(2.2, 2.2, 0.15, 64, 1, true);
const textRingMat = new THREE.MeshBasicMaterial({
  map: textTexture,
  transparent: true,
  opacity: 0.5,
  blending: THREE.AdditiveBlending,
  side: THREE.DoubleSide,
});
const textRing = new THREE.Mesh(textRingGeo, textRingMat);
textRing.position.y = 0.08;
scene.add(textRing);

// ─── Second Text Ring (upper) ───
const textRing2 = textRing.clone();
textRing2.position.y = 2.5;
textRing2.scale.setScalar(0.9);
scene.add(textRing2);

// ─── Holographic Scan Lines ───
const scanCanvas = document.createElement('canvas');
scanCanvas.width = 4;
scanCanvas.height = 256;
const scanCtx = scanCanvas.getContext('2d');
for (let y = 0; y < 256; y++) {
  const alpha = y % 4 === 0 ? 60 : 0;
  scanCtx.fillStyle = `rgba(0,255,170,${alpha / 255})`;
  scanCtx.fillRect(0, y, 4, 1);
}
const scanTexture = new THREE.CanvasTexture(scanCanvas);
scanTexture.wrapT = THREE.RepeatWrapping;
scanTexture.repeat.set(1, 3);

const scanGeo = new THREE.CylinderGeometry(1.25, 1.25, 2.8, 32, 1, true);
const scanMat = new THREE.MeshBasicMaterial({
  map: scanTexture,
  transparent: true,
  opacity: 0.12,
  blending: THREE.AdditiveBlending,
  side: THREE.DoubleSide,
  depthWrite: false,
});
const scanCylinder = new THREE.Mesh(scanGeo, scanMat);
scanCylinder.position.y = 1.2;
scene.add(scanCylinder);

// ─── Mode Switching ───
document.querySelectorAll('.ctrl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    targetMode = modes[currentMode];
  });
});

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Animation ───
const clock = new THREE.Clock();

function lerp(a, b, t) { return a + (b - a) * t; }
function lerpColor(c, target, t) {
  c.r = lerp(c.r, target.r, t);
  c.g = lerp(c.g, target.g, t);
  c.b = lerp(c.b, target.b, t);
}

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = 0.016;
  const speed = targetMode.speed;

  // Smooth mode transitions
  lerpColor(scene.background || (scene.background = new THREE.Color()), targetMode.bg, 0.02);
  lerpColor(teapotMat.emissive, targetMode.emissive, 0.02);
  lerpColor(wireMat.color, targetMode.emissive, 0.02);
  lerpColor(particleMat.color, targetMode.particleColor, 0.02);
  lerpColor(ringMat.color, targetMode.emissive, 0.02);

  // Update beam colors
  beamGroup.children.forEach(beam => {
    lerpColor(beam.material.color, targetMode.emissive, 0.02);
  });

  // Update text ring color
  textCtx.fillStyle = '#000';
  textCtx.fillRect(0, 0, 1024, 64);
  const r = Math.round(targetMode.emissive.r * 255);
  const g = Math.round(targetMode.emissive.g * 255);
  const b = Math.round(targetMode.emissive.b * 255);
  textCtx.fillStyle = `rgb(${r},${g},${b})`;
  textCtx.fillText(textContent, 512, 40);
  textTexture.needsUpdate = true;

  // Emissive pulse
  teapotMat.emissiveIntensity = 0.15 + Math.sin(t * 2 * speed) * 0.08;

  // Teapot slow rotation
  teapot.rotation.y = t * 0.15 * speed;
  wireTeapot.rotation.y = t * 0.15 * speed;

  // Scan lines scroll
  scanTexture.offset.y = t * 0.2 * speed;
  scanCylinder.rotation.y = t * 0.1;

  // Text rings rotate
  textRing.rotation.y = t * 0.08;
  textRing2.rotation.y = -t * 0.06;

  // Beam group subtle rotation
  beamGroup.rotation.y = t * 0.05;

  // Ring pulse
  const ringScale = 1 + Math.sin(t * 0.5) * 0.05;
  ring.scale.set(ringScale, ringScale, 1);
  ringMat.opacity = 0.03 + Math.sin(t * 0.8) * 0.015;

  // Particles float upward & reset
  const pos = particleGeo.attributes.position.array;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    pos[i * 3] += velocities[i * 3] * speed;
    pos[i * 3 + 1] += velocities[i * 3 + 1] * speed;
    pos[i * 3 + 2] += velocities[i * 3 + 2] * speed;
    // Swirl
    const x = pos[i * 3], z = pos[i * 3 + 2];
    const dist = Math.sqrt(x * x + z * z);
    const angle = Math.atan2(z, x) + 0.001 * speed;
    pos[i * 3] = Math.cos(angle) * dist;
    pos[i * 3 + 2] = Math.sin(angle) * dist;

    if (pos[i * 3 + 1] > 5.5) {
      const theta = Math.random() * Math.PI * 2;
      const r = 1.5 + Math.random() * 3;
      pos[i * 3] = Math.cos(theta) * r;
      pos[i * 3 + 1] = 0;
      pos[i * 3 + 2] = Math.sin(theta) * r;
    }
  }
  particleGeo.attributes.position.needsUpdate = true;

  // Lights follow mode
  lerpColor(spotLight2.color, targetMode.emissive2, 0.02);
  lerpColor(rimLight.color, targetMode.emissive, 0.02);

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
